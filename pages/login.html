<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Quan AI</title>
    <link rel="manifest" href="../manifest.json">
    <style>
        /* 1. The "Quantum Midnight" Foundation */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a0c14 0%, #04050a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        /* 2. Login Container & Typography */
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 2;
            animation: fade-in 1s ease-out forwards;
        }

        .login-container h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-top: 20px;
            margin-bottom: 8px;
        }

        .login-container p {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 40px;
        }

        /* 3. The Glowing Logo */
        .logo-wrapper img {
            width: 120px;
            height: auto;
            filter: drop-shadow(0 0 40px rgba(138, 43, 226, 0.4));
            margin-bottom: 10px;
        }

        /* 4. Professional Google Button (Glassmorphism) */
        .google-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #ffffff;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .google-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(138, 43, 226, 0.5);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.2);
            transform: translateY(-2px);
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        /* 5. Footer */
        .brand-footer {
            position: absolute;
            bottom: 40px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.25);
            font-weight: 300;
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-wrapper">
            <img src="../images/icon.png" alt="Quan AI">
        </div>
        
        <h1>Welcome to Quan</h1>
        <p>Infinite Intelligence by Goorac Corporation</p>

        <button class="google-btn" id="login-btn">
            <svg class="google-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                <path fill="none" d="M1 1h22v22H1z"/>
            </svg>
            Sign in with Google
        </button>
    </div>

    <div class="brand-footer">Powered by Goorac</div>

    <script type="module">
        // 1. We now import 'db' alongside auth
        import { auth, db, googleProvider } from '../config.js';
        import { signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        // 2. Import Firestore methods to read the database
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const loginBtn = document.getElementById('login-btn');

        // Button Click Handler
        loginBtn.addEventListener('click', async () => {
            try {
                loginBtn.style.pointerEvents = 'none';
                loginBtn.innerHTML = 'Authenticating...'; // Professional status text
                await signInWithPopup(auth, googleProvider);
            } catch (error) {
                console.error("Login failed:", error);
                loginBtn.style.pointerEvents = 'auto';
                loginBtn.innerHTML = 'Sign in with Google';
                alert("Login failed. Please try again.");
            }
        });

        // 3. Database Routing Logic
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    // Update button text so user knows we are checking their profile
                    if (loginBtn) {
                        loginBtn.innerHTML = 'Loading Profile...';
                        loginBtn.style.pointerEvents = 'none';
                    }

                    // Check if a document exists for this user ID in the 'users' collection
                    const userRef = doc(db, "users", user.uid);
                    const userSnap = await getDoc(userRef);

                    if (userSnap.exists()) {
                        // Profile exists! Send them to the main chat.
                        window.location.replace("home.html");
                    } else {
                        // Brand new user! Send them to the onboarding setup.
                        window.location.replace("setup.html");
                    }
                } catch (error) {
                    console.error("Error reading database:", error);
                    alert("Network error. Could not load profile.");
                    // Reset button if error occurs
                    if (loginBtn) {
                        loginBtn.innerHTML = 'Sign in with Google';
                        loginBtn.style.pointerEvents = 'auto';
                    }
                }
            }
        });
    </script>
</body>
</html>
