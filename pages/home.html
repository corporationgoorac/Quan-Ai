<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0c14">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Quan AI</title>
    <link rel="manifest" href="../manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        /* ==========================================================================
           1. CORE FOUNDATION & RESET
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* NEW: HIDE SCROLLBARS GLOBALLY FOR SLEEK UI */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
            display: none;
        }
        * {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* PERFECT VIEWPORT LOCK FROM GROUPCHAT.HTML */
        html, body {
            height: 100vh !important; 
            height: 100dvh !important;
            width: 100vw !important;
            overflow: hidden !important;
            background-color: #0a0c14;
            color: #ffffff;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            position: fixed !important; 
            left: 0 !important; 
            top: 0 !important;
            overscroll-behavior: none !important;
            overscroll-behavior-y: none !important; /* NEW: Kills pull-to-refresh loading bar on Android/iOS */
            touch-action: none;
            margin: 0;
            padding: 0;
        }

        .app-container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            height: 100dvh; 
            width: 100%; 
            position: fixed !important; 
            top: 0 !important; 
            left: 0 !important; 
            overflow: hidden;
        }

        .no-select {
            -webkit-user-select: none;
            user-select: none;
        }

        .material-symbols-rounded {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        /* ==========================================================================
           2. HEADER (Top Navigation)
           ========================================================================== */
        header {
            position: absolute !important; 
            top: 0 !important; 
            left: 0 !important; 
            right: 0 !important;
            height: calc(60px + env(safe-area-inset-top));
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            padding-top: calc(env(safe-area-inset-top) + 6px);
            background: rgba(10, 12, 20, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: none !important; /* UPDATED: Removed border per your request */
            z-index: 2000 !important;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-btn {
            background: none;
            border: none;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            border-radius: 50%;
            transition: background 0.3s ease;
        }

        .menu-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .brand-title {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #8a2be2, #ff4500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .profile-pic {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(138, 43, 226, 0.5);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .profile-pic:active {
            transform: scale(0.9);
        }

        /* ==========================================================================
           3. SIDEBAR (Chat History)
           ========================================================================== */
        #sidebar {
            position: absolute;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: #0d0f1a;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 3000;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        #sidebar.open {
            transform: translateX(300px);
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .new-chat-btn {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .chat-item {
            padding: 15px 20px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.2s;
            display: flex;
            align-items: center;
        }

        .chat-item:hover, .chat-item.active {
            background: rgba(138, 43, 226, 0.15);
            color: #ffffff;
            border-left: 3px solid #8a2be2;
        }

        #sidebar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
            z-index: 2500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #sidebar-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* ==========================================================================
           4. MAIN CONTENT & WELCOME SCREEN
           ========================================================================== */
        main {
            flex: 1 !important;
            width: 100%;
            padding-top: calc(75px + env(safe-area-inset-top)) !important; 
            padding-bottom: 10px !important;
            display: flex !important;
            flex-direction: column !important;
            position: relative;
            overflow-y: auto !important;
            overflow-x: hidden !important;
            -webkit-overflow-scrolling: touch !important;
            overscroll-behavior-y: contain;
        }

        #welcome-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            transition: opacity 0.4s ease, transform 0.4s ease;
            z-index: 10;
        }

        #welcome-screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, -55%);
        }

        .center-logo {
            width: 80px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 30px rgba(138, 43, 226, 0.4));
            animation: float 6s ease-in-out infinite;
        }

        .welcome-title {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 30px;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
        }

        .suggestions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .suggestion-chip {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px;
            border-radius: 15px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .suggestion-chip:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(138, 43, 226, 0.4);
            transform: translateY(-2px);
            color: #ffffff;
        }

        .suggestion-icon {
            color: #ff4500;
            font-size: 1.2rem;
        }

        /* ==========================================================================
           5. CHAT MESSAGES AREA 
           ========================================================================== */
        #messages-container {
            flex-grow: 1 !important;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.user { justify-content: flex-end; }
        .message-row.ai { justify-content: flex-start; }

        .bubble {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .bubble.user {
            background: #2a2a35;
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        .bubble.ai {
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.15), rgba(255, 69, 0, 0.1));
            border: 1px solid rgba(138, 43, 226, 0.2);
            color: #ffffff;
            border-bottom-left-radius: 4px;
        }

        .message-image {
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 8px;
            display: block;
        }

        /* ==========================================================================
           6. FLAGSHIP CAPSULE INPUT AREA (PROFESSIONALLY UPDATED)
           ========================================================================== */
        .input-area-container {
            background: transparent;
            border-top: 1px solid transparent;
            padding-bottom: env(safe-area-inset-bottom, 10px);
            flex-shrink: 0;
            width: 100%;
            z-index: 1000;
            position: relative;
            margin-top: auto; /* Pushes it to the very bottom */
            touch-action: pan-y !important;
        }

        .input-area {
            margin: 12px 24px; /* Compressed small look by default */
            padding: 6px 10px; /* Thicker and more elegant */
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: rgba(18, 18, 24, 0.85); /* Richer dark glass background */
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08); /* More subtle, premium border */
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); /* Cleaner resting shadow */
            transform: scale(0.96); /* Physically smaller */
            transform-origin: bottom center;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
            touch-action: none !important;
            position: relative;
        }

        /* Expands beautifully when focused or when text is inside */
        .input-area:focus-within, .input-area.focused {
            margin: 8px 12px; /* Expand full width */
            transform: scale(1); /* Grow to full size */
            border-radius: 28px; /* Slightly squarer on focus for typing area */
            background: rgba(22, 22, 30, 0.98); /* Solid background on focus */
            border-color: rgba(138, 43, 226, 0.6); /* Vibrant active border */
            box-shadow: 0 0 0 1px rgba(138, 43, 226, 0.2), 0 10px 40px rgba(0,0,0,0.5); /* Ambient glow effect */
        }

        .input-box {
            flex: 1;
            display: flex;
            align-items: center;
            min-height: 40px;
        }

        #chat-input {
            width: 100%;
            background: transparent;
            border: none;
            color: #f0f0f0; /* Softer, premium white text */
            padding: 10px 4px; /* Better vertical breathing room */
            font-size: 1.05rem;
            resize: none;
            max-height: 120px;
            outline: none;
            font-family: inherit;
            line-height: 1.5; /* Enhanced readability */
            overscroll-behavior-y: contain;
        }

        #chat-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .plus-btn {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            color: #8a2be2;
            cursor: pointer;
            height: 38px;
            width: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            align-self: flex-end;
            margin-bottom: 3px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.2s;
            border: none;
        }

        .plus-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        .send-btn {
            background: linear-gradient(135deg, #8a2be2, #ff4500);
            border: none;
            border-radius: 50%;
            min-width: 38px;
            width: 38px;
            height: 38px;
            display: none; /* Hide by default, show when active */
            align-items: center;
            justify-content: center;
            color: #fff;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            align-self: flex-end;
            margin-bottom: 3px;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0);
        }
        
        .send-btn.active {
            cursor: pointer;
            pointer-events: auto;
            display: flex !important;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
            transform: scale(1.05);
        }

        .mic-btn-wrapper {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 100;
            align-self: flex-end;
            margin-bottom: 3px;
        }

        .mic-btn {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: transparent;
            color: #8a2be2;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            touch-action: none;
        }

        /* Image Preview Popup Container */
        #image-preview-container {
            display: none; 
            position: absolute; 
            bottom: 100%; 
            left: 20px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            border: 2px solid #8a2be2; 
            width: 80px; 
            height: 80px; 
            overflow: hidden; 
            background: #1a1a1a; 
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        /* ==========================================================================
           7. INSTALL BANNER
           ========================================================================== */
        #install-banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 12, 20, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: none; 
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            z-index: 4000;
            border-bottom: 1px solid rgba(138, 43, 226, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transform: translateY(-100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #install-banner.visible {
            display: flex;
            transform: translateY(0);
        }

        .install-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .install-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.2);
        }

        .install-text {
            display: flex;
            flex-direction: column;
        }

        .install-text strong {
            font-size: 0.95rem;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .install-text span {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .install-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #install-btn {
            background: linear-gradient(90deg, #8a2be2, #ff4500);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        #install-btn:active {
            transform: scale(0.95);
        }

        #close-install-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            cursor: pointer;
        }

        /* ==========================================================================
           8. NEW: THINKING INDICATOR & TYPING EFFECT CSS
           ========================================================================== */
        .thinking-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 18px;
            opacity: 0;
            transition: opacity 0.3s ease;
            display: none;
            margin-top: 5px;
        }
        .thinking-wrapper.active {
            display: flex;
            opacity: 1;
        }
        .thinking-logo-container {
            position: relative;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .thinking-logo {
            width: 24px;
            height: 24px;
            z-index: 2;
            border-radius: 50%;
            animation: pulse-logo 2s ease-in-out infinite;
        }
        .thinking-spinner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid transparent;
            border-top-color: #8a2be2;
            border-right-color: #ff4500;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 1;
        }
        .thinking-text {
            font-size: 0.9rem;
            background: linear-gradient(90deg, #8a2be2, #ff4500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 500;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .typing-cursor::after {
            content: '▋';
            animation: blink 1s step-start infinite;
            color: #8a2be2;
            margin-left: 2px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        @keyframes pulse-logo { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes blink { 50% { opacity: 0; } }

        /* ==========================================================================
           9. NEW: BOTTOM MODAL FOR CHAT OPTIONS (PIN & DELETE)
           ========================================================================== */
        #bottom-modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
            z-index: 4500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #bottom-modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .bottom-modal {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #1a1a24;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 20px 20px 30px 20px;
            z-index: 5000;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.5);
        }
        .bottom-modal.show {
            transform: translateY(0);
        }
        .modal-drag-handle {
            width: 40px; height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            margin: 0 auto 10px auto;
        }
        .modal-option {
            display: flex; align-items: center; gap: 15px;
            background: rgba(255,255,255,0.05);
            border: none; border-radius: 12px;
            padding: 15px; color: #fff;
            font-size: 1rem; cursor: pointer;
            transition: background 0.2s;
        }
        .modal-option:hover, .modal-option:active {
            background: rgba(255,255,255,0.1);
        }
        .modal-option.delete {
            color: #ff4500;
        }
        .modal-option.delete .material-symbols-rounded {
            color: #ff4500;
        }

    </style>
</head>
<body>

<div class="app-container" id="main-app">

    <div id="install-banner" class="no-select">
        <div class="install-info">
            <img src="../images/icon.png" alt="Quan AI Icon" class="install-icon">
            <div class="install-text">
                <strong>Quan AI</strong>
                <span>Install app for full-screen experience</span>
            </div>
        </div>
        <div class="install-actions">
            <button id="install-btn">Install</button>
            <button id="close-install-btn"><span class="material-symbols-rounded">close</span></button>
        </div>
    </div>

    <div id="sidebar-overlay" class="no-select"></div>

    <aside id="sidebar">
        <div class="sidebar-header no-select">
            <span class="brand-title">History</span>
            <button class="menu-btn" id="close-sidebar-btn">
                <span class="material-symbols-rounded">close</span>
            </button>
        </div>
        <button class="new-chat-btn no-select" id="new-chat-btn">
            <span class="material-symbols-rounded">add_circle</span>
            New Chat
        </button>
        <div class="chat-list" id="chat-history-list">
            </div>
    </aside>

    <header class="no-select" id="chat-header">
        <div class="header-left">
            <button class="menu-btn" id="open-sidebar-btn">
                <span class="material-symbols-rounded">menu</span>
            </button>
            <span class="brand-title">Quan AI</span>
        </div>
        <img src="" alt="Profile" class="profile-pic" id="header-profile-pic" style="display: none;">
    </header>

    <main id="chat-flow">
        
        <div id="welcome-screen">
            <img src="../images/icon.png" alt="Quan AI Logo" class="center-logo no-select">
            <h1 class="welcome-title no-select" id="welcome-greeting">How can I help you today?</h1>
            
            <div class="suggestions-grid no-select">
                <div class="suggestion-chip" onclick="fillInput('Draft a polite email to my team about a project delay.')">
                    <span class="material-symbols-rounded suggestion-icon">edit_document</span>
                    Draft a professional email
                </div>
                <div class="suggestion-chip" onclick="fillInput('Write a short, poetic verse about the ocean.')">
                    <span class="material-symbols-rounded suggestion-icon">auto_awesome</span>
                    Write a creative poem
                </div>
                <div class="suggestion-chip" onclick="fillInput('Explain Quantum Computing to a 5 year old.')">
                    <span class="material-symbols-rounded suggestion-icon">school</span>
                    Explain a complex topic
                </div>
                <div class="suggestion-chip" onclick="fillInput('Help me brainstorm names for a new tech startup.')">
                    <span class="material-symbols-rounded suggestion-icon">lightbulb</span>
                    Brainstorm ideas
                </div>
            </div>
        </div>

        <div id="messages-container">
            </div>

    </main>

    <div class="input-area-container">
        
        <div id="image-preview-container">
            <img id="image-preview" src="" alt="Preview" style="width: 100%; height: 100%; object-fit: cover;">
            <button id="remove-image-btn" style="position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.7); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                <span class="material-symbols-rounded" style="font-size: 16px;">close</span>
            </button>
        </div>

        <input type="file" id="image-upload" accept="image/*" style="display: none;">
        
        <div class="input-area" id="input-capsule">
            <button class="plus-btn" id="attach-btn" title="Attach Image">
                <span class="material-symbols-rounded">image</span>
            </button>
            
            <div class="input-box">
                <textarea id="chat-input" placeholder="Ask Quan anything..." rows="1"></textarea>
            </div>
            
            <button class="send-btn" id="send-btn" title="Send Message">
                <span class="material-symbols-rounded">send</span>
            </button>

            <div id="mic-btn-wrapper" class="mic-btn-wrapper">
                <div id="mic-btn" class="mic-btn" title="Voice Input">
                    <span class="material-symbols-rounded">mic</span>
                </div>
            </div>
        </div>
    </div>

    <div id="bottom-modal-overlay" class="no-select"></div>
    <div id="chat-options-modal" class="bottom-modal no-select">
        <div class="modal-drag-handle"></div>
        <button class="modal-option" id="pin-chat-btn">
            <span class="material-symbols-rounded">keep</span> <span id="pin-chat-text">Pin Chat</span>
        </button>
        <button class="modal-option delete" id="delete-chat-btn">
            <span class="material-symbols-rounded">delete</span> Delete Chat
        </button>
    </div>

</div> 

    <script type="module">
        import { auth, db } from '../config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { collection, query, orderBy, onSnapshot, addDoc, doc, getDoc, setDoc, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        // DOM Elements
        const chatInput = document.getElementById('chat-input');
        const inputCapsule = document.getElementById('input-capsule');
        const welcomeScreen = document.getElementById('welcome-screen');
        const messagesContainer = document.getElementById('messages-container');
        const chatFlow = document.getElementById('chat-flow');
        const sendBtn = document.getElementById('send-btn');
        const micBtnWrapper = document.getElementById('mic-btn-wrapper');
        const attachBtn = document.getElementById('attach-btn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const openSidebarBtn = document.getElementById('open-sidebar-btn');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');
        const headerProfilePic = document.getElementById('header-profile-pic');
        const welcomeGreeting = document.getElementById('welcome-greeting');
        const newChatBtn = document.getElementById('new-chat-btn');

        const imageUpload = document.getElementById('image-upload');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreview = document.getElementById('image-preview');
        const removeImageBtn = document.getElementById('remove-image-btn');

        // NEW: Modal DOM Elements
        const bottomModalOverlay = document.getElementById('bottom-modal-overlay');
        const chatOptionsModal = document.getElementById('chat-options-modal');
        const pinChatBtn = document.getElementById('pin-chat-btn');
        const pinChatText = document.getElementById('pin-chat-text');
        const deleteChatBtn = document.getElementById('delete-chat-btn');

        let currentUser = null;
        let currentChatId = null; 
        let messagesUnsubscribe = null; 
        let selectedImageBase64 = null;
        let selectedChatIdForModal = null; // Tracks which chat was long-pressed

        // NEW: Smart typing logic states
        window.isThinking = false;
        window.typedMessages = new Set(); 
        window.isInitialChatLoad = true; // NEW: Solves the old chat typing bug!

        /* ==========================================================================
           1. INITIALIZATION & SECURITY ROUTING
           ========================================================================== */
        const cachedPhoto = localStorage.getItem('quan_user_photo');
        const cachedName = localStorage.getItem('quan_user_name');
        if (cachedPhoto) {
            headerProfilePic.src = cachedPhoto;
            headerProfilePic.style.display = 'block';
        }
        if (cachedName) {
            welcomeGreeting.innerText = `Hi ${cachedName.split(' ')[0]}, how can I help you today?`;
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                
                if(user.photoURL) {
                    headerProfilePic.src = user.photoURL;
                    headerProfilePic.style.display = 'block';
                    localStorage.setItem('quan_user_photo', user.photoURL);
                } else {
                    // Fallback to icon if user didn't upload a profile picture
                    headerProfilePic.src = '../images/icon.png';
                    headerProfilePic.style.display = 'block';
                }
                
                const hasProfileLocally = localStorage.getItem('quan_has_profile') === 'true';
                if (!hasProfileLocally) {
                    const userRef = doc(db, "users", user.uid);
                    const userSnap = await getDoc(userRef);
                    if (!userSnap.exists()) {
                        window.location.replace("setup.html");
                        return;
                    } else {
                        localStorage.setItem('quan_has_profile', 'true');
                        localStorage.setItem('quan_user_photo', user.photoURL || '');
                    }
                }
                
                loadSidebarHistory();

            } else {
                window.location.replace("login.html");
            }
        });

        /* ==========================================================================
           NEW: THINKING INDICATOR HELPER
           ========================================================================== */
        function updateThinkingIndicator() {
            let thinkingEl = document.getElementById('quan-thinking-indicator');
            if (!thinkingEl) {
                thinkingEl = document.createElement('div');
                thinkingEl.id = 'quan-thinking-indicator';
                thinkingEl.className = 'thinking-wrapper';
                thinkingEl.innerHTML = `
                    <div class="thinking-logo-container">
                        <div class="thinking-spinner"></div>
                        <img src="../images/icon.png" class="thinking-logo">
                    </div>
                    <div class="thinking-text">Quan is thinking...</div>
                `;
            }
            messagesContainer.appendChild(thinkingEl);

            if (window.isThinking) {
                thinkingEl.classList.add('active');
                chatFlow.scrollTo({ top: chatFlow.scrollHeight, behavior: 'smooth' });
            } else {
                thinkingEl.classList.remove('active');
            }
        }

        /* ==========================================================================
           VIEWPORT LOCK LOGIC (AGGRESSIVE ANTI-SCROLL FROM GROUPCHAT.HTML)
           ========================================================================== */
        function lockViewportAndHeader() {
            const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            const app = document.getElementById('main-app');
            if(app) app.style.height = vh + 'px';
            document.body.style.height = '100vh';
            window.scrollTo(0, 0);
            document.documentElement.scrollTop = 0;
            document.body.scrollTop = 0;
            document.body.style.top = '0px';
            
            if (messagesContainer && messagesContainer.children.length > 0) {
                chatFlow.scrollTo({
                    top: chatFlow.scrollHeight,
                    behavior: 'auto'
                });
            }
        }

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', lockViewportAndHeader);
            window.visualViewport.addEventListener('scroll', lockViewportAndHeader);
        }
        window.addEventListener('resize', lockViewportAndHeader);
        window.addEventListener('scroll', lockViewportAndHeader, { passive: true });

        setInterval(() => {
            if (document.activeElement === chatInput || window.scrollY > 0 || document.body.scrollTop > 0) {
                window.scrollTo(0, 0);
                document.documentElement.scrollTop = 0;
                document.body.scrollTop = 0;
            }
        }, 50);

        /* ==========================================================================
           IMAGE COMPRESSION LOGIC
           ========================================================================== */
        attachBtn.addEventListener('click', () => {
            imageUpload.click();
        });

        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800; 
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        selectedImageBase64 = canvas.toDataURL('image/jpeg', 0.7); 
                        
                        imagePreview.src = selectedImageBase64;
                        imagePreviewContainer.style.display = 'block'; 
                        
                        inputCapsule.classList.add('focused');
                        sendBtn.classList.add('active'); 
                        micBtnWrapper.style.display = 'none';
                        attachBtn.style.display = 'none';
                    }
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        removeImageBtn.addEventListener('click', () => {
            selectedImageBase64 = null;
            imagePreview.src = '';
            imagePreviewContainer.style.display = 'none';
            imageUpload.value = ''; 
            if (chatInput.value.trim().length === 0) {
                inputCapsule.classList.remove('focused');
                sendBtn.classList.remove('active');
                micBtnWrapper.style.display = 'flex';
                attachBtn.style.display = 'flex';
            }
        });

        /* ==========================================================================
           UI INTERACTIONS (CAPSULE EXPANSION)
           ========================================================================== */
        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            
            if (this.value.trim().length > 0 || selectedImageBase64) {
                inputCapsule.classList.add('focused');
                sendBtn.classList.add('active');
                micBtnWrapper.style.display = 'none';
                attachBtn.style.display = 'none';
            } else {
                inputCapsule.classList.remove('focused');
                sendBtn.classList.remove('active');
                micBtnWrapper.style.display = 'flex';
                attachBtn.style.display = 'flex';
            }
            
            chatFlow.scrollTo({ top: chatFlow.scrollHeight });
        });

        chatInput.addEventListener('focus', () => {
            inputCapsule.classList.add('focused');
            if (messagesContainer.children.length === 0) {
                welcomeScreen.classList.add('hidden');
            }
            setTimeout(lockViewportAndHeader, 10);
            setTimeout(lockViewportAndHeader, 50);
            setTimeout(lockViewportAndHeader, 300);
        });

        chatInput.addEventListener('blur', () => {
            if (chatInput.value.trim() === '' && !selectedImageBase64) {
                inputCapsule.classList.remove('focused');
                if (messagesContainer.children.length === 0) {
                    welcomeScreen.classList.remove('hidden');
                    chatInput.style.height = 'auto'; 
                }
            }
            setTimeout(lockViewportAndHeader, 100);
        });

        window.fillInput = (text) => {
            chatInput.value = text;
            chatInput.focus();
            chatInput.dispatchEvent(new Event('input'));
        };

        /* ==========================================================================
           NEW: MODAL & ENHANCED SIDEBAR NAVIGATION LOGIC
           ========================================================================== */
        function openChatModal(chatId, isPinned) {
            selectedChatIdForModal = chatId;
            pinChatText.innerText = isPinned ? "Unpin Chat" : "Pin Chat";
            bottomModalOverlay.classList.add('show');
            chatOptionsModal.classList.add('show');
            history.pushState({ chatModalOpen: true }, "");
        }

        function closeChatModal() {
            bottomModalOverlay.classList.remove('show');
            chatOptionsModal.classList.remove('show');
            selectedChatIdForModal = null;
        }

        bottomModalOverlay.addEventListener('click', () => {
            closeChatModal();
            if (history.state && history.state.chatModalOpen) {
                history.back();
            }
        });

        const toggleSidebar = () => {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('show');
            
            if (sidebar.classList.contains('open')) {
                history.pushState({ sidebarOpen: true }, "");
            } else {
                if (history.state && history.state.sidebarOpen) {
                    history.back(); 
                }
            }
        };

        openSidebarBtn.addEventListener('click', toggleSidebar);
        closeSidebarBtn.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);

        window.addEventListener('popstate', (e) => {
            if (chatOptionsModal.classList.contains('show')) {
                closeChatModal();
            } else if (sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('show');
            }
        });

        newChatBtn.addEventListener('click', () => {
            currentChatId = null;
            messagesContainer.innerHTML = '';
            welcomeScreen.classList.remove('hidden');
            chatInput.value = '';
            chatInput.style.height = 'auto';
            inputCapsule.classList.remove('focused');
            sendBtn.classList.remove('active');
            micBtnWrapper.style.display = 'flex';
            attachBtn.style.display = 'flex';
            
            selectedImageBase64 = null;
            imagePreviewContainer.style.display = 'none';
            imagePreview.src = '';
            imageUpload.value = '';

            window.isThinking = false;
            window.typedMessages.clear();
            window.isInitialChatLoad = true; // NEW: Reset typing flag for new chat

            if (messagesUnsubscribe) messagesUnsubscribe(); 
            toggleSidebar();
            
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
        });

        // NEW: Database actions for modal buttons (Delete & Pin)
        deleteChatBtn.addEventListener('click', async () => {
            if(!selectedChatIdForModal || !currentUser) return;
            // Native confirm popup removed per request, automatically proceed to delete
            const confirmDelete = true; 
            if (confirmDelete) {
                try {
                    await deleteDoc(doc(db, `users/${currentUser.uid}/chats/${selectedChatIdForModal}`));
                    // Reset screen if we deleted the chat we are currently looking at
                    if(currentChatId === selectedChatIdForModal) {
                        newChatBtn.click();
                    }
                    closeChatModal();
                    if (history.state && history.state.chatModalOpen) history.back();
                } catch(e) {
                    console.error("Error deleting chat", e);
                }
            }
        });

        pinChatBtn.addEventListener('click', async () => {
            if(!selectedChatIdForModal || !currentUser) return;
            try {
                const chatRef = doc(db, `users/${currentUser.uid}/chats/${selectedChatIdForModal}`);
                const chatSnap = await getDoc(chatRef);
                if(chatSnap.exists()){
                    const isPinned = chatSnap.data().pinned || false;
                    await setDoc(chatRef, { pinned: !isPinned }, { merge: true });
                }
                closeChatModal();
                if (history.state && history.state.chatModalOpen) history.back();
            } catch(e) {
                console.error("Error pinning chat", e);
            }
        });

        /* ==========================================================================
           CHAT LOGIC (SEND & DB SYNC)
           ========================================================================== */
        
        async function handleSend() {
            const text = chatInput.value.trim();
            if ((!text && !selectedImageBase64) || !currentUser) return;

            const currentImage = selectedImageBase64; 

            chatInput.value = '';
            chatInput.style.height = 'auto';
            inputCapsule.classList.remove('focused');
            sendBtn.classList.remove('active');
            micBtnWrapper.style.display = 'flex';
            attachBtn.style.display = 'flex';
            welcomeScreen.classList.add('hidden'); 
            
            imagePreviewContainer.style.display = 'none';
            imagePreview.src = '';
            selectedImageBase64 = null;
            imageUpload.value = '';

            window.isInitialChatLoad = false; // Turn off initial load flag so new incoming message gets typed!

            try {
                if (!currentChatId) {
                    currentChatId = "chat_" + Date.now();
                    
                    const chatDocRef = doc(db, `users/${currentUser.uid}/chats/${currentChatId}`);
                    let chatTitle = text.length > 25 ? text.substring(0, 25) + '...' : text;
                    if (!chatTitle && currentImage) chatTitle = "Image Upload";
                    
                    await setDoc(chatDocRef, {
                        title: chatTitle,
                        updatedAt: serverTimestamp(),
                        createdAt: serverTimestamp(),
                        pinned: false // New chats default to unpinned
                    });

                    listenToChat(currentChatId);
                } else {
                    const chatDocRef = doc(db, `users/${currentUser.uid}/chats/${currentChatId}`);
                    await setDoc(chatDocRef, { updatedAt: serverTimestamp() }, { merge: true });
                }

                const path = `users/${currentUser.uid}/chats/${currentChatId}/messages`;
                const messagesRef = collection(db, path);

                const messagePayload = {
                    text: text,
                    role: "user",
                    uid: currentUser.uid,
                    timestamp: serverTimestamp(), 
                    needs_ai_reply: true 
                };

                if (currentImage) {
                    messagePayload.imageUrl = currentImage;
                }

                await addDoc(messagesRef, messagePayload);

            } catch (error) {
                console.error("Error sending message:", error);
                alert("Error: Message failed to send.");
            }
        }

        sendBtn.addEventListener('click', handleSend);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        /* ==========================================================================
           DATABASE LISTENERS (WITH TYPING EFFECT)
           ========================================================================== */
        
        function listenToChat(chatId) {
            if (messagesUnsubscribe) messagesUnsubscribe(); 

            const path = `users/${currentUser.uid}/chats/${chatId}/messages`;
            const q = query(collection(db, path), orderBy("timestamp", "asc"));

            messagesUnsubscribe = onSnapshot(q, (snapshot) => {
                messagesContainer.innerHTML = ''; 
                
                let messagesList = [];
                snapshot.forEach((doc) => {
                    const docData = doc.data();
                    const docId = doc.id;
                    messagesList.push({ ...docData, docId: docId });
                    
                    if(window.isInitialChatLoad) {
                        window.typedMessages.add(docId);
                    }
                });

                window.isInitialChatLoad = false; // Turn off initial load flag after first snapshot

                messagesList.sort((a, b) => {
                    const timeA = a.timestamp ? (a.timestamp.toMillis ? a.timestamp.toMillis() : a.timestamp) : Infinity;
                    const timeB = b.timestamp ? (b.timestamp.toMillis ? b.timestamp.toMillis() : b.timestamp) : Infinity;
                    return timeA - timeB;
                });
                
                let isLastAi = false;

                messagesList.forEach((data, index) => {
                    const row = document.createElement('div');
                    row.className = `message-row ${data.role}`;
                    const bubble = document.createElement('div');
                    bubble.className = `bubble ${data.role}`;
                    
                    if (data.imageUrl) {
                        const img = document.createElement('img');
                        img.src = data.imageUrl;
                        img.className = 'message-image';
                        bubble.appendChild(img);
                    }
                    
                    if (data.text) {
                        const textSpan = document.createElement('span');
                        bubble.appendChild(textSpan);
                        
                        const isLastItem = (index === messagesList.length - 1);
                        
                        // Smart Typer logic
                        if (data.role === 'ai' && isLastItem) {
                            isLastAi = true;
                            if (!window.typedMessages.has(data.docId)) {
                                window.typedMessages.add(data.docId);
                                textSpan.classList.add('typing-cursor');
                                textSpan.innerText = '';
                                let i = 0;
                                window.isThinking = false; 
                                
                                const typeWriter = setInterval(() => {
                                    if (i < data.text.length) {
                                        textSpan.innerText += data.text.charAt(i);
                                        i++;
                                        chatFlow.scrollTo({ top: chatFlow.scrollHeight });
                                    } else {
                                        clearInterval(typeWriter);
                                        textSpan.classList.remove('typing-cursor');
                                    }
                                }, 15); 
                            } else {
                                textSpan.innerText = data.text; 
                            }
                        } else {
                            textSpan.innerText = data.text; 
                        }
                    }
                    
                    row.appendChild(bubble);
                    messagesContainer.appendChild(row);
                });

                if (messagesList.length > 0 && messagesList[messagesList.length - 1].role === 'user') {
                    window.isThinking = true;
                } else if (isLastAi) {
                    window.isThinking = false;
                }

                updateThinkingIndicator();
            });
        }

        function loadSidebarHistory() {
            const chatsRef = collection(db, `users/${currentUser.uid}/chats`);
            const q = query(chatsRef, orderBy("updatedAt", "desc")); 

            onSnapshot(q, (snapshot) => {
                const historyList = document.getElementById('chat-history-list');
                historyList.innerHTML = ''; 
                
                if (snapshot.empty) {
                    historyList.innerHTML = `
                        <div class="chat-item" style="color: rgba(255,255,255,0.3); text-align: center; margin-top: 20px; flex-direction: column; cursor: default;">
                            <span class="material-symbols-rounded" style="font-size: 2rem; margin-bottom: 10px;">history</span>
                            No previous chats found.
                        </div>
                    `;
                    return;
                }

                let chats = [];
                snapshot.forEach((docSnap) => {
                    chats.push({ id: docSnap.id, ...docSnap.data() });
                });

                // Client-side sorting so pinned chats permanently stay at the top
                chats.sort((a, b) => {
                    if (a.pinned && !b.pinned) return -1;
                    if (!a.pinned && b.pinned) return 1;
                    return 0; 
                });

                chats.forEach((data) => {
                    const chatId = data.id;
                    const title = data.title || "New Chat";
                    const isPinned = data.pinned || false;

                    const chatEl = document.createElement('div');
                    chatEl.className = 'chat-item';
                    
                    if (chatId === currentChatId) {
                        chatEl.classList.add('active');
                    }
                    
                    chatEl.innerText = title;

                    // Add visual pin icon to the right side if it's pinned
                    if (isPinned) {
                        const pinIcon = document.createElement('span');
                        pinIcon.className = 'material-symbols-rounded';
                        pinIcon.innerText = 'keep';
                        pinIcon.style.fontSize = '16px';
                        pinIcon.style.marginLeft = 'auto';
                        pinIcon.style.color = '#8a2be2';
                        chatEl.appendChild(pinIcon);
                    }

                    // Long Press Logic (Smart Timer)
                    let longPressTimer;
                    let isLongPressing = false;

                    const startPress = () => {
                        isLongPressing = false;
                        longPressTimer = setTimeout(() => {
                            isLongPressing = true;
                            openChatModal(chatId, isPinned);
                        }, 600); // Triggers modal after 600ms hold
                    };
                    const cancelPress = () => clearTimeout(longPressTimer);

                    chatEl.addEventListener('touchstart', startPress, { passive: true });
                    chatEl.addEventListener('touchend', cancelPress);
                    chatEl.addEventListener('touchmove', cancelPress);
                    
                    chatEl.addEventListener('mousedown', startPress);
                    chatEl.addEventListener('mouseup', cancelPress);
                    chatEl.addEventListener('mouseleave', cancelPress);

                    // Normal click logic (canceled if it was a long press)
                    chatEl.onclick = (e) => {
                        if (isLongPressing) {
                            e.preventDefault();
                            return; 
                        }
                        
                        currentChatId = chatId;
                        welcomeScreen.classList.add('hidden'); 
                        
                        document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
                        chatEl.classList.add('active');
                        
                        window.isInitialChatLoad = true; // Tell the listener this is an old chat opening
                        listenToChat(chatId);
                        
                        if (window.innerWidth <= 768) {
                            toggleSidebar();
                        }
                    };

                    historyList.appendChild(chatEl);
                });
            });
        }
    </script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../sw.js')
                    .then(registration => {
                        console.log('[Quan AI] Service Worker successfully registered:', registration.scope);
                    })
                    .catch(error => {
                        console.error('[Quan AI] Service Worker registration failed:', error);
                    });
            });
        }
    </script>

    <script>
        let deferredPrompt;
        const installBanner = document.getElementById('install-banner');
        const installBtn = document.getElementById('install-btn');
        const closeInstallBtn = document.getElementById('close-install-btn');

        const isInstallDismissed = localStorage.getItem('quan_install_dismissed');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (!isInstallDismissed) {
                setTimeout(() => {
                    installBanner.style.display = 'flex';
                    void installBanner.offsetWidth; 
                    installBanner.classList.add('visible');
                }, 1000); 
            }
        });

        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`[Quan AI] User response to install prompt: ${outcome}`);
            deferredPrompt = null;
            installBanner.classList.remove('visible');
            setTimeout(() => installBanner.style.display = 'none', 400);
        });

        closeInstallBtn.addEventListener('click', () => {
            installBanner.classList.remove('visible');
            setTimeout(() => installBanner.style.display = 'none', 400);
            localStorage.setItem('quan_install_dismissed', 'true');
        });

        window.addEventListener('appinstalled', () => {
            installBanner.style.display = 'none';
            deferredPrompt = null;
            console.log('[Quan AI] PWA was successfully installed');
        });
    </script>
