<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0c14">
    <title>Quan AI</title>
    <link rel="manifest" href="../manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        /* ==========================================================================
           1. CORE FOUNDATION & RESET
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            height: 100dvh !important;
            background-color: #0a0c14;
            color: #ffffff;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .no-select {
            -webkit-user-select: none;
            user-select: none;
        }

        .material-symbols-rounded {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        /* ==========================================================================
           2. HEADER (Top Navigation)
           ========================================================================== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(10, 12, 20, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: none !important;
            position: absolute;
            position: fixed !important;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-btn {
            background: none;
            border: none;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            border-radius: 50%;
            transition: background 0.3s ease;
        }

        .menu-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .brand-title {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #8a2be2, #ff4500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .profile-pic {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(138, 43, 226, 0.5);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .profile-pic:active {
            transform: scale(0.9);
        }

        /* ==========================================================================
           3. SIDEBAR (Chat History)
           ========================================================================== */
        #sidebar {
            position: absolute;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: #0d0f1a;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 200;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        #sidebar.open {
            transform: translateX(300px);
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .new-chat-btn {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .chat-item {
            padding: 15px 20px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.2s;
        }

        .chat-item:hover, .chat-item.active {
            background: rgba(138, 43, 226, 0.15);
            color: #ffffff;
            border-left: 3px solid #8a2be2;
        }

        /* Sidebar Overlay */
        #sidebar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #sidebar-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* ==========================================================================
           4. MAIN CONTENT & WELCOME SCREEN
           ========================================================================== */
        main {
            height: 100%;
            width: 100%;
            padding-top: 65px;
            padding-bottom: 90px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #welcome-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            transition: opacity 0.4s ease, transform 0.4s ease;
            z-index: 10;
        }

        #welcome-screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, -55%);
        }

        .center-logo {
            width: 80px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 30px rgba(138, 43, 226, 0.4));
            animation: float 6s ease-in-out infinite;
        }

        .welcome-title {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 30px;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
        }

        .suggestions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .suggestion-chip {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px;
            border-radius: 15px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .suggestion-chip:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(138, 43, 226, 0.4);
            transform: translateY(-2px);
            color: #ffffff;
        }

        .suggestion-icon {
            color: #ff4500;
            font-size: 1.2rem;
        }

        /* ==========================================================================
           5. CHAT MESSAGES AREA (UPDATED FOR IMAGES)
           ========================================================================== */
        #messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        #messages-container::-webkit-scrollbar { width: 0px; }

        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.user { justify-content: flex-end; }
        .message-row.ai { justify-content: flex-start; }

        .bubble {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .bubble.user {
            background: #2a2a35;
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        .bubble.ai {
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.15), rgba(255, 69, 0, 0.1));
            border: 1px solid rgba(138, 43, 226, 0.2);
            color: #ffffff;
            border-bottom-left-radius: 4px;
        }

        /* ADDED: Styling for images inside chat bubbles */
        .message-image {
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 8px;
            display: block;
        }

        /* ==========================================================================
           6. CAPSULE INPUT AREA (UPDATED WITH IMAGE PREVIEW CSS)
           ========================================================================== */
        #input-wrapper {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 700px;
            display: flex;
            align-items: flex-end;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 8px 15px;
            backdrop-filter: blur(15px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 50;
        }

        #input-wrapper.focused {
            width: 95%;
            background: rgba(20, 22, 35, 0.9);
            border-color: rgba(138, 43, 226, 0.6);
            box-shadow: 0 0 25px rgba(138, 43, 226, 0.25), 0 0 10px rgba(255, 69, 0, 0.1);
        }

        /* ADDED: Image Preview Popup Container */
        #image-preview-container {
            display: none; 
            position: absolute; 
            bottom: 100%; 
            left: 20px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            border: 2px solid #8a2be2; 
            width: 80px; 
            height: 80px; 
            overflow: hidden; 
            background: #1a1a1a; 
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 1rem;
            font-family: inherit;
            padding: 10px 5px;
            max-height: 120px;
            resize: none;
            outline: none;
            overflow-y: auto;
            line-height: 1.4;
        }

        #chat-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .input-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 5px;
        }

        .action-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            padding: 8px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
        }

        #send-btn {
            color: #8a2be2;
        }
        
        #send-btn.active {
            color: #ff4500;
            background: rgba(255, 69, 0, 0.1);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        @media (max-width: 600px) {
            .suggestions-grid { grid-template-columns: 1fr; }
            #input-wrapper { width: 95%; bottom: 15px; }
            #input-wrapper.focused { width: 98%; }
        }

        /* ==========================================================================
           7. INSTALL BANNER
           ========================================================================== */
        #install-banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 12, 20, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: none; 
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            z-index: 1000;
            border-bottom: 1px solid rgba(138, 43, 226, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transform: translateY(-100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #install-banner.visible {
            display: flex;
            transform: translateY(0);
        }

        .install-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .install-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.2);
        }

        .install-text {
            display: flex;
            flex-direction: column;
        }

        .install-text strong {
            font-size: 0.95rem;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .install-text span {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .install-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #install-btn {
            background: linear-gradient(90deg, #8a2be2, #ff4500);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        #install-btn:active {
            transform: scale(0.95);
        }

        #close-install-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            cursor: pointer;
        }

        /* ==========================================================================
           8. ADDED: Viewport Lock & Professional Capsule Overrides
           ========================================================================== */
        body {
            position: fixed !important;
            width: 100vw !important;
        }

        #input-wrapper {
            position: fixed !important; 
            background: rgba(30, 30, 36, 0.85) !important; 
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 26px !important;
            padding: 6px 16px !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6) !important;
        }

        #input-wrapper.focused {
            background: rgba(35, 35, 42, 0.98) !important;
            border-color: rgba(138, 43, 226, 0.5) !important;
            box-shadow: 0 0 0 1px rgba(138, 43, 226, 0.4), 0 10px 40px rgba(0, 0, 0, 0.8) !important;
            width: 92% !important;
        }

        #chat-input {
            padding: 12px 8px !important;
            font-size: 1.05rem !important;
        }

        /* ==========================================================================
           9. FINAL POLISH: Perfect Viewport Lock & Flagship Capsule Makeover
           ========================================================================== */
        html, body {
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
            overscroll-behavior: none !important; 
        }

        main {
            height: calc(100% - 130px) !important; 
            overflow-y: auto !important;
            -webkit-overflow-scrolling: touch !important; 
            padding-bottom: 20px !important; 
        }

        #input-wrapper {
            position: absolute !important;
            bottom: 20px !important;
            background: #1a1a24 !important; 
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            border-radius: 40px !important; 
            padding: 6px 8px 6px 20px !important; 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255,255,255,0.05) !important;
            align-items: center !important; 
        }

        #input-wrapper.focused {
            background: #1f1f2e !important;
            border-color: rgba(138, 43, 226, 0.8) !important;
            box-shadow: 0 0 0 1px rgba(138, 43, 226, 0.6), 0 15px 50px rgba(0, 0, 0, 0.9) !important;
            transform: translateX(-50%) translateY(-5px) !important; 
            bottom: 20px !important; 
        }

        #chat-input {
            padding: 14px 10px !important;
            font-size: 1.05rem !important;
            color: #ffffff !important;
            margin-right: 5px !important;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05) !important;
            border-radius: 50% !important;
            width: 42px !important;
            height: 42px !important;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1) !important;
        }

        #send-btn.active {
            background: linear-gradient(135deg, #8a2be2, #ff4500) !important;
            color: white !important;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4) !important;
            transform: scale(1.05) !important;
        }

        /* ==========================================================================
           10. FINAL FIXES: GroupChat.html Overrides (Scroll & Input)
           ========================================================================== */
        body {
            display: flex !important;
            flex-direction: column !important;
            overflow: hidden !important; 
        }

        header {
            position: relative !important; 
            flex-shrink: 0 !important;
            z-index: 100 !important;
        }

        main {
            flex-grow: 1 !important; 
            position: relative !important;
            height: auto !important; 
            padding-top: 0 !important; 
            padding-bottom: 0 !important;
            display: flex !important;
            flex-direction: column !important;
            overflow: hidden !important; 
        }

        #messages-container {
            flex-grow: 1 !important;
            overflow-y: auto !important;
            padding-bottom: 100px !important; 
        }

        #input-wrapper {
            position: absolute !important;
            bottom: 20px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            width: 95% !important;
            max-width: 800px !important;
            z-index: 50 !important;
            background-color: #1a1a1a !important;
            border-radius: 30px !important;
            padding: 8px 12px !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5) !important;
            align-items: center !important;
            border: 1px solid #333 !important;
        }
        
        #input-wrapper.focused {
             transform: translateX(-50%) !important;
             border-color: #8a2be2 !important;
             box-shadow: 0 0 15px rgba(138, 43, 226, 0.4) !important;
        }

        .input-actions {
            padding-bottom: 0 !important; 
        }
        
        #welcome-screen {
            z-index: 5 !important; 
        }
    </style>
</head>
<body>

    <div id="install-banner" class="no-select">
        <div class="install-info">
            <img src="../images/icon.png" alt="Quan AI Icon" class="install-icon">
            <div class="install-text">
                <strong>Quan AI</strong>
                <span>Install app for full-screen experience</span>
            </div>
        </div>
        <div class="install-actions">
            <button id="install-btn">Install</button>
            <button id="close-install-btn"><span class="material-symbols-rounded">close</span></button>
        </div>
    </div>

    <div id="sidebar-overlay" class="no-select"></div>

    <aside id="sidebar">
        <div class="sidebar-header no-select">
            <span class="brand-title">History</span>
            <button class="menu-btn" id="close-sidebar-btn">
                <span class="material-symbols-rounded">close</span>
            </button>
        </div>
        <button class="new-chat-btn no-select" id="new-chat-btn">
            <span class="material-symbols-rounded">add_circle</span>
            New Chat
        </button>
        <div class="chat-list" id="chat-history-list">
            </div>
    </aside>

    <header class="no-select">
        <div class="header-left">
            <button class="menu-btn" id="open-sidebar-btn">
                <span class="material-symbols-rounded">menu</span>
            </button>
            <span class="brand-title">Quan AI</span>
        </div>
        <img src="" alt="Profile" class="profile-pic" id="header-profile-pic" style="display: none;">
    </header>

    <main>
        
        <div id="welcome-screen">
            <img src="../images/icon.png" alt="Quan AI Logo" class="center-logo no-select">
            <h1 class="welcome-title no-select" id="welcome-greeting">How can I help you today?</h1>
            
            <div class="suggestions-grid no-select">
                <div class="suggestion-chip" onclick="fillInput('Draft a polite email to my team about a project delay.')">
                    <span class="material-symbols-rounded suggestion-icon">edit_document</span>
                    Draft a professional email
                </div>
                <div class="suggestion-chip" onclick="fillInput('Write a short, poetic verse about the ocean.')">
                    <span class="material-symbols-rounded suggestion-icon">auto_awesome</span>
                    Write a creative poem
                </div>
                <div class="suggestion-chip" onclick="fillInput('Explain Quantum Computing to a 5 year old.')">
                    <span class="material-symbols-rounded suggestion-icon">school</span>
                    Explain a complex topic
                </div>
                <div class="suggestion-chip" onclick="fillInput('Help me brainstorm names for a new tech startup.')">
                    <span class="material-symbols-rounded suggestion-icon">lightbulb</span>
                    Brainstorm ideas
                </div>
            </div>
        </div>

        <div id="messages-container">
            </div>

    </main>

    <div id="input-wrapper">
        <div id="image-preview-container">
            <img id="image-preview" src="" alt="Preview" style="width: 100%; height: 100%; object-fit: cover;">
            <button id="remove-image-btn" style="position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.7); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                <span class="material-symbols-rounded" style="font-size: 16px;">close</span>
            </button>
        </div>

        <input type="file" id="image-upload" accept="image/*" style="display: none;">
        <button class="action-btn" id="attach-btn" title="Attach Image">
            <span class="material-symbols-rounded">image</span>
        </button>

        <button class="action-btn" title="Voice Input">
            <span class="material-symbols-rounded">mic</span>
        </button>
        
        <textarea id="chat-input" placeholder="Ask Quan anything..." rows="1"></textarea>
        
        <div class="input-actions">
            <button class="action-btn" id="send-btn" title="Send Message">
                <span class="material-symbols-rounded">send</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { auth, db } from '../config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { collection, query, orderBy, onSnapshot, addDoc, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        // DOM Elements
        const chatInput = document.getElementById('chat-input');
        const inputWrapper = document.getElementById('input-wrapper');
        const welcomeScreen = document.getElementById('welcome-screen');
        const messagesContainer = document.getElementById('messages-container');
        const sendBtn = document.getElementById('send-btn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const openSidebarBtn = document.getElementById('open-sidebar-btn');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');
        const headerProfilePic = document.getElementById('header-profile-pic');
        const welcomeGreeting = document.getElementById('welcome-greeting');
        const newChatBtn = document.getElementById('new-chat-btn');

        // ADDED: DOM Elements for Image Upload
        const attachBtn = document.getElementById('attach-btn');
        const imageUpload = document.getElementById('image-upload');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreview = document.getElementById('image-preview');
        const removeImageBtn = document.getElementById('remove-image-btn');

        let currentUser = null;
        let currentChatId = null; // null means we are in a "New Chat" state
        let messagesUnsubscribe = null; // For cleaning up listeners
        
        // ADDED: State variable to hold the Base64 image
        let selectedImageBase64 = null;

        /* ==========================================================================
           1. INITIALIZATION & SECURITY ROUTING
           ========================================================================== */
        // Instantly load locally cached profile picture and name for 0ms visual delay
        const cachedPhoto = localStorage.getItem('quan_user_photo');
        const cachedName = localStorage.getItem('quan_user_name');
        if (cachedPhoto) {
            headerProfilePic.src = cachedPhoto;
            headerProfilePic.style.display = 'block';
        }
        if (cachedName) {
            welcomeGreeting.innerText = `Hi ${cachedName.split(' ')[0]}, how can I help you today?`;
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                
                // Security Check: Verify they actually completed the setup profile
                const hasProfileLocally = localStorage.getItem('quan_has_profile') === 'true';
                if (!hasProfileLocally) {
                    // Double check with database to be sure
                    const userRef = doc(db, "users", user.uid);
                    const userSnap = await getDoc(userRef);
                    if (!userSnap.exists()) {
                        console.log("[Quan AI] No profile data found. Redirecting to setup...");
                        window.location.replace("setup.html");
                        return;
                    } else {
                        // Data exists in DB but not local (cleared cache), resync it
                        localStorage.setItem('quan_has_profile', 'true');
                        localStorage.setItem('quan_user_photo', user.photoURL || '');
                    }
                }
                
                // User is fully verified. Load Sidebar history.
                loadSidebarHistory();

            } else {
                console.log("[Quan AI] Session expired. Redirecting to login...");
                window.location.replace("login.html");
            }
        });

        /* ==========================================================================
           ADDED: IMAGE SELECTION LOGIC
           ========================================================================== */
        
        // Trigger file input when clip icon is clicked
        attachBtn.addEventListener('click', () => {
            imageUpload.click();
        });

        // Convert the image to Base64 when selected
        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    selectedImageBase64 = event.target.result; // Grab the Base64 string
                    imagePreview.src = selectedImageBase64;
                    imagePreviewContainer.style.display = 'block'; // Show popup
                    sendBtn.classList.add('active'); // Allow sending even if text is empty
                };
                reader.readAsDataURL(file);
            }
        });

        // Cancel the image
        removeImageBtn.addEventListener('click', () => {
            selectedImageBase64 = null;
            imagePreview.src = '';
            imagePreviewContainer.style.display = 'none';
            imageUpload.value = ''; // Reset file input
            // Check if we should disable the send button
            if (chatInput.value.trim().length === 0) {
                sendBtn.classList.remove('active');
            }
        });

        /* ==========================================================================
           2. UI INTERACTIONS (Capsule Glow & Welcome Screen Hide)
           ========================================================================== */
        
        // Auto-resize textarea logic
        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            
            // Highlight send button if there is text OR an image selected (UPDATED LINE)
            if (this.value.trim().length > 0 || selectedImageBase64) {
                sendBtn.classList.add('active');
            } else {
                sendBtn.classList.remove('active');
            }
        });

        // Expand and Glow Capsule on Focus
        chatInput.addEventListener('focus', () => {
            inputWrapper.classList.add('focused');
            // Hide welcome screen smoothly to transition to chat mode
            if (messagesContainer.children.length === 0) {
                welcomeScreen.classList.add('hidden');
            }
        });

        // Shrink Capsule if empty and blurred
        chatInput.addEventListener('blur', () => {
            // UPDATED: Check for selected image too
            if (chatInput.value.trim() === '' && !selectedImageBase64) {
                inputWrapper.classList.remove('focused');
                // Bring back welcome screen if no messages exist
                if (messagesContainer.children.length === 0) {
                    welcomeScreen.classList.remove('hidden');
                    chatInput.style.height = 'auto'; // Reset height
                }
            }
        });

        // Allow suggestion chips to fill the input and focus it
        window.fillInput = (text) => {
            chatInput.value = text;
            chatInput.focus();
            // Trigger the input event to resize the box and highlight the button
            chatInput.dispatchEvent(new Event('input'));
        };

        /* ==========================================================================
           3. SIDEBAR NAVIGATION & MOBILE BACK BUTTON LOGIC
           ========================================================================== */
        const toggleSidebar = () => {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('show');
            
            // --- NEW: History API Logic for Mobile Back Button ---
            // If we just opened the sidebar, push a new state to the browser history
            if (sidebar.classList.contains('open')) {
                history.pushState({ sidebarOpen: true }, "");
            } else {
                // If we manually closed it (via button), remove that history state
                if (history.state && history.state.sidebarOpen) {
                    history.back(); 
                }
            }
        };

        openSidebarBtn.addEventListener('click', toggleSidebar);
        closeSidebarBtn.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);

        // --- NEW: Intercept the Android Hardware Back Button ---
        window.addEventListener('popstate', (e) => {
            // If the user presses the phone's back button and the sidebar is open, close it!
            if (sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('show');
            }
        });

        // Reset to new chat
        newChatBtn.addEventListener('click', () => {
            currentChatId = null;
            messagesContainer.innerHTML = '';
            welcomeScreen.classList.remove('hidden');
            chatInput.value = '';
            chatInput.style.height = 'auto';
            inputWrapper.classList.remove('focused');
            sendBtn.classList.remove('active');
            
            // Reset image picker
            selectedImageBase64 = null;
            imagePreviewContainer.style.display = 'none';
            imagePreview.src = '';
            imageUpload.value = '';

            if (messagesUnsubscribe) messagesUnsubscribe(); // Stop listening to old chat
            toggleSidebar();
            
            // visually clear active state
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
        });

        /* ==========================================================================
           4. CHAT LOGIC (Send & Receive) & REAL FIREBASE HISTORY FIX
           ========================================================================== */
        
        // Render a single message bubble (UPDATED to accept an image)
        function appendMessage(text, role, imageUrl = null) {
            const row = document.createElement('div');
            row.className = `message-row ${role}`;
            
            const bubble = document.createElement('div');
            bubble.className = `bubble ${role}`;
            
            // ADDED: Render the image inside the bubble if it exists
            if (imageUrl) {
                const imgEl = document.createElement('img');
                imgEl.src = imageUrl;
                imgEl.className = 'message-image';
                bubble.appendChild(imgEl);
            }
            
            // Render the text safely without overwriting the image
            if (text) {
                const textSpan = document.createElement('span');
                textSpan.innerText = text;
                bubble.appendChild(textSpan);
            }

            // ORIGINAL LINE COMMENTED OUT TO PRESERVE YOUR EXACT CODE (We use the span above instead so it doesn't break images)
            // bubble.innerText = text; 
            
            row.appendChild(bubble);
            messagesContainer.appendChild(row);
            
            // Auto scroll to bottom smoothly
            messagesContainer.scrollTo({
                top: messagesContainer.scrollHeight,
                behavior: 'smooth'
            });
        }

        async function handleSend() {
            const text = chatInput.value.trim();
            // UPDATED: Check for both text AND image before rejecting
            if ((!text && !selectedImageBase64) || !currentUser) return;

            // Capture the image right now in case the user types fast and sends another
            const currentImage = selectedImageBase64; 

            // 1. Immediately update UI
            chatInput.value = '';
            chatInput.style.height = 'auto';
            sendBtn.classList.remove('active');
            welcomeScreen.classList.add('hidden'); // Ensure it's hidden
            
            // Hide and clear the image preview popup
            imagePreviewContainer.style.display = 'none';
            imagePreview.src = '';
            selectedImageBase64 = null;
            imageUpload.value = '';

            // Render it optimistically on screen!
            appendMessage(text, 'user', currentImage);

            try {
                // 2. THIS WAS THE MISSING PIECE: Create the Parent Document!
                if (!currentChatId) {
                    currentChatId = "chat_" + Date.now();
                    
                    // Create the actual Chat Room Document for the sidebar to read
                    const chatDocRef = doc(db, `users/${currentUser.uid}/chats/${currentChatId}`);
                    
                    // Use the first 25 characters of their message as the Chat Title (or "Image Upload" if empty)
                    let chatTitle = text.length > 25 ? text.substring(0, 25) + '...' : text;
                    if (!chatTitle && currentImage) chatTitle = "Image Upload";
                    
                    // FIX: Using Date.now() instead of serverTimestamp() for 0ms visual latency!
                    await setDoc(chatDocRef, {
                        title: chatTitle,
                        updatedAt: Date.now(),
                        createdAt: Date.now()
                    });

                    // Setup the listener for this new room immediately
                    listenToChat(currentChatId);
                } else {
                    // FIX: Using Date.now() here too
                    const chatDocRef = doc(db, `users/${currentUser.uid}/chats/${currentChatId}`);
                    await setDoc(chatDocRef, { updatedAt: Date.now() }, { merge: true });
                }

                // 3. Send the flare gun (the message itself) to Firebase
                const path = `users/${currentUser.uid}/chats/${currentChatId}/messages`;
                const messagesRef = collection(db, path);

                // FIX: Use Date.now() here as well to guarantee immediate rendering
                // UPDATED: Construct payload to include image dynamically
                const messagePayload = {
                    text: text,
                    role: "user",
                    uid: currentUser.uid,
                    timestamp: Date.now(),
                    needs_ai_reply: true // Tells your Node Backend to wake up
                };

                // Add Base64 image to the database payload if one was attached
                if (currentImage) {
                    messagePayload.imageUrl = currentImage;
                }

                await addDoc(messagesRef, messagePayload);

            } catch (error) {
                console.error("Error sending message:", error);
                appendMessage("Error: Could not connect to Quan servers.", 'ai');
            }
        }

        // Send via button click or Enter key (preventing default new line on Enter)
        sendBtn.addEventListener('click', handleSend);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        /* ==========================================================================
           5. DATABASE LISTENERS (REAL SIDEBAR SYNC)
           ========================================================================== */
        
        function listenToChat(chatId) {
            if (messagesUnsubscribe) messagesUnsubscribe(); // Clear previous listener

            const path = `users/${currentUser.uid}/chats/${chatId}/messages`;
            const q = query(collection(db, path), orderBy("timestamp", "asc"));

            messagesUnsubscribe = onSnapshot(q, (snapshot) => {
                // For simplicity here, we clear and re-render.
                messagesContainer.innerHTML = ''; 
                
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const row = document.createElement('div');
                    row.className = `message-row ${data.role}`;
                    const bubble = document.createElement('div');
                    bubble.className = `bubble ${data.role}`;
                    
                    // ADDED IMAGE SUPPORT FOR REAL-TIME RENDERING
                    if (data.imageUrl) {
                        const img = document.createElement('img');
                        img.src = data.imageUrl;
                        img.className = 'message-image';
                        bubble.appendChild(img);
                    }
                    if (data.text) {
                        const textSpan = document.createElement('span');
                        textSpan.innerText = data.text;
                        bubble.appendChild(textSpan);
                    }

                    // ORIGINAL LINE COMMENTED OUT TO PRESERVE YOUR EXACT CODE
                    // bubble.innerText = data.text;
                    
                    row.appendChild(bubble);
                    messagesContainer.appendChild(row);
                });

                messagesContainer.scrollTo({
                    top: messagesContainer.scrollHeight,
                    behavior: 'smooth'
                });
            });
        }

        function loadSidebarHistory() {
            // WE NOW QUERY THE REAL FIREBASE COLLECTION FOR CHATS!
            const chatsRef = collection(db, `users/${currentUser.uid}/chats`);
            const q = query(chatsRef, orderBy("updatedAt", "desc")); // Newest chats at the top

            onSnapshot(q, (snapshot) => {
                const historyList = document.getElementById('chat-history-list');
                historyList.innerHTML = ''; // Clear out the placeholder
                
                if (snapshot.empty) {
                    historyList.innerHTML = `
                        <div class="chat-item" style="color: rgba(255,255,255,0.3); text-align: center; margin-top: 20px;">
                            <span class="material-symbols-rounded" style="font-size: 2rem; margin-bottom: 10px; display:block;">history</span>
                            No previous chats found.
                        </div>
                    `;
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const chatId = docSnap.id;
                    const title = data.title || "New Chat";

                    // Create the clickable sidebar item
                    const chatEl = document.createElement('div');
                    chatEl.className = 'chat-item';
                    
                    // Highlight if it's the chat we are currently looking at
                    if (chatId === currentChatId) {
                        chatEl.classList.add('active');
                    }
                    
                    chatEl.innerText = title;

                    // Make it clickable to load the past chat
                    chatEl.onclick = () => {
                        currentChatId = chatId;
                        welcomeScreen.classList.add('hidden'); // Hide the greeting
                        
                        // Visually switch active state
                        document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
                        chatEl.classList.add('active');
                        
                        // Load messages from firebase
                        listenToChat(chatId);
                        
                        // Auto-close sidebar on mobile after selecting a chat
                        if (window.innerWidth <= 768) {
                            toggleSidebar();
                        }
                    };

                    historyList.appendChild(chatEl);
                });
            });
        }
    </script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Ensure the path correctly points to sw.js in your root folder
                navigator.serviceWorker.register('../sw.js')
                    .then(registration => {
                        console.log('[Quan AI] Service Worker successfully registered:', registration.scope);
                    })
                    .catch(error => {
                        console.error('[Quan AI] Service Worker registration failed:', error);
                    });
            });
        }
    </script>

    <script>
        let deferredPrompt;
        const installBanner = document.getElementById('install-banner');
        const installBtn = document.getElementById('install-btn');
        const closeInstallBtn = document.getElementById('close-install-btn');

        // Check if user already dismissed the prompt previously
        const isInstallDismissed = localStorage.getItem('quan_install_dismissed');

        // Listen for the native browser install prompt event
        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent the default mini-infobar from appearing
            e.preventDefault();
            
            // Stash the event so it can be triggered later.
            deferredPrompt = e;
            
            // If they haven't dismissed it, slide our custom professional banner down
            if (!isInstallDismissed) {
                setTimeout(() => {
                    installBanner.style.display = 'flex';
                    // Trigger reflow to ensure the CSS transition animates smoothly
                    void installBanner.offsetWidth; 
                    installBanner.classList.add('visible');
                }, 1000); // Wait 1 second after load so it feels natural
            }
        });

        // Handle Install Button Click
        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            
            // Show the native browser install prompt
            deferredPrompt.prompt();
            
            // Wait for the user to respond to the native prompt
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`[Quan AI] User response to install prompt: ${outcome}`);
            
            // Clear the deferredPrompt variable, it can only be used once
            deferredPrompt = null;
            
            // Hide our custom banner smoothly
            installBanner.classList.remove('visible');
            setTimeout(() => installBanner.style.display = 'none', 400);
        });

        // Handle Close Button Click
        closeInstallBtn.addEventListener('click', () => {
            installBanner.classList.remove('visible');
            setTimeout(() => installBanner.style.display = 'none', 400);
            // Save preference so we never bother them again on this device
            localStorage.setItem('quan_install_dismissed', 'true');
        });

        // If the app is successfully installed outside of our button (e.g. from browser menu)
        window.addEventListener('appinstalled', () => {
            installBanner.style.display = 'none';
            deferredPrompt = null;
            console.log('[Quan AI] PWA was successfully installed');
        });
    </script>

    <script>
        // This API listens to the actual visible screen space (excluding the keyboard)
        // It shrinks the body exactly to fit the screen above the keyboard, forcing ONLY the input to move up.
        if (window.visualViewport) {
            const viewport = window.visualViewport;
            const body = document.body;
            
            viewport.addEventListener('resize', () => {
                // Remove the manual setting of body height and scroll lock as it conflicts with flex layout
                // The flexbox overrides above handle the sizing naturally.
            });
        }
    </script>
