<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quan AI | Goorac Corporation</title>
    <style>
        /* 1. Professional Dark Foundation */
        body {
            background-color: #080808; /* Our chosen Deep Charcoal */
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        /* 2. Logo Animation */
        .logo-container {
            text-align: center;
            animation: fadeIn 1.2s ease-in-out;
        }

        .logo-container img {
            width: 150px; /* Adjust size as needed */
            height: auto;
            filter: drop-shadow(0 0 15px rgba(138, 43, 226, 0.3));
        }

        /* 3. Subtle Loading Indicator */
        .loader {
            margin-top: 30px;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #ff4500; /* Matching logo orange */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* 4. Footer Branding */
        footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: #555555;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="images/icon.png" alt="Quan AI Logo">
    </div>

    <div class="loader"></div>

    <footer>Powered by Goorac</footer>

    <script type="module">
        // Import only what is necessary from your clean config
        import { auth } from './config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        // We wait a tiny moment to ensure the splash feel is smooth
        setTimeout(() => {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    // User is logged in, move to Home
                    window.location.replace("pages/home.html");
                } else {
                    // No session found, move to Login
                    window.location.replace("pages/login.html");
                }
            });
        }, 1500); // 1.5 seconds for branding impact
    </script>

</body>
</html>
